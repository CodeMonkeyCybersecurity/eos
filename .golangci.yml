# .golangci.yml - golangci-lint v2 configuration
# Last Updated: 2026-02-19
# Documentation: https://golangci-lint.run/docs/configuration/file/
#
# This configuration enforces Eos code quality standards as defined in CLAUDE.md.
# Used by:
#   - Local development (golangci-lint run)
#   - Pre-commit hooks (.git/hooks/pre-commit)
#   - CI/CD (.github/workflows/lint.yml)

version: "2"

# Run Configuration
run:
  timeout: 10m
  tests: true
  build-tags:
    - integration
    - unit

# Linter Selection and Settings
linters:
  # Use recommended linters as baseline, then enable additional ones
  default: standard

  enable:
    # Code Quality (P0 - critical)
    # NOTE: gosimple merged into staticcheck in golangci-lint v2
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Security (P0 - critical for Eos)
    - gosec

    # Style and Best Practices
    - misspell
    - unconvert
    - unparam
    - goconst
    - prealloc

    # Bug Prevention
    # NOTE: exportloopref removed - fixed in Go 1.22+ language spec
    - nolintlint
    - bodyclose
    - contextcheck

    # Performance
    - nakedret
    - nilerr

  # Per-linter settings (v2: nested under linters.settings)
  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104  # Covered by errcheck
        - G304  # File path from variable - common in CLI tools
        - G306  # WriteFile permissions - we use constants

    errcheck:
      check-blank: true
      check-type-assertions: true
      exclude-functions:
        - (*github.com/spf13/cobra.Command).MarkFlagRequired

    govet:
      enable-all: true
      disable:
        - shadow          # Too noisy for large projects
        - fieldalignment  # Struct field ordering - not critical

    staticcheck:
      checks: ["all", "-SA1019"]  # All except deprecated usage

    nakedret:
      max-func-lines: 5

    goconst:
      min-len: 3
      min-occurrences: 3
      ignore-tests: true

    unparam:
      check-exported: false

  # Exclusion rules (v2: nested under linters.exclusions)
  exclusions:
    # Do not use default exclusion presets
    presets: []

    # Path-based exclusions (replaces skip-dirs and skip-files)
    paths:
      - vendor
      - testdata
      - third_party$
      - ".*\\.pb\\.go$"
      - ".*_gen\\.go$"
      # pkg/ceph uses CGo (go-ceph/rados) which requires librados-dev C headers.
      # These headers are not installed in the CI container (catthehacker/ubuntu:act-latest).
      # Lint pkg/ceph locally with librados-dev installed: golangci-lint run ./pkg/ceph/...
      - "^pkg/ceph/"

    # Rule-based exclusions (replaces issues.exclude-rules)
    rules:
      # Test files - relaxed rules
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
          - goconst

      # cmd/ orchestration layer
      - path: ^cmd/
        linters:
          - goconst
          - unparam

      # Mock/stub files
      - path: "(mock|stub|fake).*\\.go"
        linters:
          - errcheck
          - gosec

      # Unchecked Close/Flush/Remove - safe to ignore
      - text: "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*print(f|ln)?|os\\.(Un)?Setenv). is not checked"
        linters:
          - errcheck

# Issues Configuration
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

# Output Configuration
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      colors: true
  sort-results: true
  sort-order:
    - linter
    - file
  show-stats: true

# Severity Configuration
severity:
  default: error
  rules:
    - linters:
        - misspell
        - goconst
      severity: warning
