name: CI Debug Parity

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-debug:
    runs-on: [self-hosted, general]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v5.0.2
        with:
          go-version-file: go.mod

      - name: Install CGo dependencies
        run: |
          set -euo pipefail
          # libvirt-dev: pkg/kvm imports libvirt.org/go/libvirt (CGo)
          # librados-dev: pkg/cephfs imports go-ceph/cephfs/admin and go-ceph/rados (CGo)
          # Note: pkg/ceph diagnostics_sdk.go is handled by the noceph build tag in
          # .golangci.yml (routes to pure-Go stub), so librados is only needed for pkg/cephfs.
          apt-get update -qq
          apt-get install -y --no-install-recommends libvirt-dev librados-dev 2>/dev/null \
            || echo "::warning::CGo deps install failed; golangci-lint may fail on pkg/kvm or pkg/cephfs"

      - name: Init prompts submodule (HTTPS with token)
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # SSH→HTTPS rewrite for CI runner auth (no SSH keys in container)
          git config --local url."http://vhost7:8167/".insteadOf "ssh://git@vhost7:9001/"

          # The container cannot resolve 'vhost7' hostname but CAN reach the IP-based
          # URL that the checkout action configured git credentials for.
          # Detect that IP URL from git config and add a rewrite: vhost7→IP.
          # This lets 'git submodule update' reach the Gitea server via the reachable route.
          _ip_url=$(git config --local --get-regexp 'http\..*\.extraheader' 2>/dev/null \
            | sed -n 's|^http\.\(http://[0-9.]*:[0-9]*/\)\.extraheader.*|\1|p' | head -1 || true)
          if [[ -n "${_ip_url}" && "${_ip_url}" != "http://vhost7:8167/" ]]; then
            git config --local url."${_ip_url}".insteadOf "http://vhost7:8167/"
            echo "Rewriting http://vhost7:8167/ → ${_ip_url}"
          fi

          # Use available token for HTTPS auth
          TOKEN="${GITEA_TOKEN:-${GITHUB_TOKEN:-}}"
          if [[ -n "${TOKEN}" ]]; then
            git config --local http.http://vhost7:8167/.extraheader "Authorization: token ${TOKEN}"
          fi

          # Init only the prompts submodule (propagation_pyramid tests require it).
          # Soft failure: emit warning so propagate-script-exists gives a clear signal.
          if git submodule update --init prompts 2>&1; then
            git -C prompts config pull.rebase true 2>/dev/null || true
          else
            echo "::warning::prompts submodule init failed; propagation_pyramid tests will fail"
          fi

      - name: Verify ci:debug parity contract
        run: |
          set -euo pipefail
          make ci-verify-parity

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Run npm ci:debug
        env:
          CI: "true"
          GITEA_ACTIONS: "true"
        run: |
          set -euo pipefail
          npm run ci:debug --silent

      - name: Print ci:debug artifacts
        if: always()
        run: |
          set -euo pipefail
          test -f outputs/ci/debug/report.json && cat outputs/ci/debug/report.json || true
          test -f outputs/ci/debug/metrics.prom && cat outputs/ci/debug/metrics.prom || true
          test -f outputs/ci/governance-propagation-coverage/coverage.txt && cat outputs/ci/governance-propagation-coverage/coverage.txt || true

      - name: Alert on ci:debug failure details
        if: always()
        run: |
          set -euo pipefail
          if ! command -v python3 >/dev/null 2>&1; then
            echo "::warning::python3 unavailable; skipping ci:debug alert extraction"
            exit 0
          fi
          python3 scripts/ci/report-alert.py ci-debug outputs/ci/debug/report.json
