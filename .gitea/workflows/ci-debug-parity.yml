name: CI Debug Parity

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-debug:
    runs-on: [self-hosted, general]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v5.0.2
        with:
          go-version-file: go.mod

      - name: Install CGo dependencies
        run: |
          set -euo pipefail
          # libvirt-dev: pkg/kvm imports libvirt.org/go/libvirt (CGo)
          # librados-dev: pkg/cephfs imports go-ceph/cephfs/admin and go-ceph/rados (CGo)
          # Note: pkg/ceph diagnostics_sdk.go is handled by the noceph build tag in
          # .golangci.yml (routes to pure-Go stub), so librados is only needed for pkg/cephfs.
          apt-get update -qq
          apt-get install -y --no-install-recommends libvirt-dev librados-dev 2>/dev/null \
            || echo "::warning::CGo deps install failed; golangci-lint may fail on pkg/kvm or pkg/cephfs"

      - name: Init prompts submodule
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          set -euo pipefail
          # CI containers cannot resolve 'gitea.cybermonkey.sh' hostname but CAN
          # reach the IP-based Gitea URL. actions/checkout stores auth in LOCAL git
          # config; submodule clone subprocesses only inherit GLOBAL/SYSTEM config.
          #
          # Strategy:
          #   1. Detect IP-based URL from checkout's local extraheader config
          #   2. Set up url.*.insteadOf so hostname URLs rewrite to IP URLs
          #   3. Copy auth from local to global config
          #   4. Remove empty prompts/ dir if present (actions/checkout creates it)
          #   5. Run git submodule update --init (uses rewritten URL + global auth)
          #
          # If init fails, propagation tests skip gracefully via dispatcher guard.

          _ip_base=$(git config --local --get-regexp 'http\..*\.extraheader' 2>/dev/null \
            | sed -n 's|^http\.\(http://[^/]*:[0-9][^/]*/\)\.extraheader.*|\1|p' | head -1 || true)

          if [[ -n "${_ip_base}" ]]; then
            echo "Detected IP-based server: ${_ip_base}"

            # Rewrite hostname URLs to IP URLs (git built-in URL substitution)
            git config --global url."${_ip_base}".insteadOf "https://gitea.cybermonkey.sh/"

            # Copy checkout action's auth to global config so submodule clone inherits it
            _auth_header=$(git config --local "http.${_ip_base}.extraheader" 2>/dev/null || true)
            if [[ -n "${_auth_header}" ]]; then
              echo "Propagating checkout auth to global config"
              git config --global "http.${_ip_base}.extraHeader" "${_auth_header}"
            elif [[ -n "${GITEA_TOKEN:-}" ]]; then
              echo "Using GITEA_TOKEN secret for auth"
              _auth_b64=$(printf "x:%s" "${GITEA_TOKEN}" | base64 -w0)
              git config --global "http.${_ip_base}.extraHeader" "AUTHORIZATION: basic ${_auth_b64}"
            else
              echo "::warning::No auth available for submodule clone"
            fi
          else
            echo "::warning::Could not detect IP-based server URL from checkout config"
          fi

          # actions/checkout creates empty prompts/ for registered submodules.
          # git submodule update --init needs it empty OR properly initialized.
          if [[ -d prompts && ! -f prompts/.git && ! -d prompts/.git ]]; then
            rmdir prompts 2>/dev/null || true
          fi

          echo "Initializing prompts submodule..."
          if GIT_TERMINAL_PROMPT=0 git submodule update --init --depth=1 prompts 2>&1; then
            echo "prompts submodule initialized successfully"
          else
            echo "::warning::prompts submodule init failed; propagation tests will skip gracefully"
          fi

      - name: Verify ci:debug parity contract
        run: |
          set -euo pipefail
          make ci-verify-parity

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Run npm ci:debug
        env:
          CI: "true"
          GITEA_ACTIONS: "true"
        run: |
          set -euo pipefail
          npm run ci:debug --silent

      - name: Print ci:debug artifacts
        if: always()
        run: |
          set -euo pipefail
          test -f outputs/ci/debug/report.json && cat outputs/ci/debug/report.json || true
          test -f outputs/ci/debug/metrics.prom && cat outputs/ci/debug/metrics.prom || true
          test -f outputs/ci/governance-propagation-coverage/coverage.txt && cat outputs/ci/governance-propagation-coverage/coverage.txt || true

      - name: Alert on ci:debug failure details
        if: always()
        run: |
          set -euo pipefail
          if ! command -v python3 >/dev/null 2>&1; then
            echo "::warning::python3 unavailable; skipping ci:debug alert extraction"
            exit 0
          fi
          python3 scripts/ci/report-alert.py ci-debug outputs/ci/debug/report.json
