name: CI Debug Parity

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-debug:
    runs-on: [self-hosted, general]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v5.0.2
        with:
          go-version-file: go.mod

      - name: Install CGo dependencies
        run: |
          set -euo pipefail
          # libvirt-dev: pkg/kvm imports libvirt.org/go/libvirt (CGo)
          # librados-dev: pkg/cephfs imports go-ceph/cephfs/admin and go-ceph/rados (CGo)
          # Note: pkg/ceph diagnostics_sdk.go is handled by the noceph build tag in
          # .golangci.yml (routes to pure-Go stub), so librados is only needed for pkg/cephfs.
          apt-get update -qq
          apt-get install -y --no-install-recommends libvirt-dev librados-dev 2>/dev/null \
            || echo "::warning::CGo deps install failed; golangci-lint may fail on pkg/kvm or pkg/cephfs"

      - name: Init prompts submodule (HTTPS with token)
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The CI container cannot resolve 'vhost7' hostname but CAN reach the
          # IP-based Gitea URL that the checkout action configured credentials for.
          #
          # Strategy: detect that IP URL, then:
          #   1. git submodule init   → registers hostname URL in .git/config
          #   2. git config override  → replace registered URL with IP URL
          #   3. Configure auth in GLOBAL git config (local config is NOT inherited
          #      by the git-clone subprocess spawned by git submodule update)
          #   4. git submodule update → clones via IP with auth from global config

          # Step 1: Detect the IP-based URL from checkout's extraheader config
          _ip_base=$(git config --local --get-regexp 'http\..*\.extraheader' 2>/dev/null \
            | sed -n 's|^http\.\(http://[^/]*:[0-9][^/]*/\)\.extraheader.*|\1|p' | head -1 || true)

          # Step 2: Get the prompts submodule URL from .gitmodules
          _sub_url=$(git config -f .gitmodules submodule.prompts.url 2>/dev/null || true)

          if [[ -n "${_ip_base}" && -n "${_sub_url}" ]]; then
            # Rewrite scheme+host to the reachable IP URL
            _sub_path=$(echo "${_sub_url}" | sed 's|.*://[^/]*||')
            _ip_sub_url="${_ip_base%/}${_sub_path}"
            echo "Overriding prompts URL to IP-based server"

            # Configure auth in GLOBAL git config so it propagates to subprocesses.
            # The checkout action sets auth only in LOCAL config, which git-clone
            # subprocesses (spawned by git submodule update) do NOT inherit.
            _auth_b64=$(printf ":%s" "${GITEA_TOKEN}" | base64 -w0)
            git config --global "http.${_ip_base}.extraheader" "AUTHORIZATION: basic ${_auth_b64}"

            # Register submodule (writes hostname URL to .git/config), then override
            git submodule init prompts 2>/dev/null || true
            git config submodule.prompts.url "${_ip_sub_url}"

            # Clone without --init (URL already registered and overridden above).
            # GIT_TERMINAL_PROMPT=0 prevents interactive credential prompts.
            if GIT_TERMINAL_PROMPT=0 git submodule update prompts 2>&1; then
              git -C prompts config pull.rebase true 2>/dev/null || true
              echo "prompts submodule initialized successfully"
            else
              echo "::warning::prompts submodule clone failed; propagation_pyramid tests will fail"
            fi
          else
            echo "::warning::Could not detect IP server URL; propagation_pyramid tests will fail"
            echo "  ip_base='${_ip_base}' sub_url='${_sub_url}'"
          fi

      - name: Verify ci:debug parity contract
        run: |
          set -euo pipefail
          make ci-verify-parity

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Run npm ci:debug
        env:
          CI: "true"
          GITEA_ACTIONS: "true"
        run: |
          set -euo pipefail
          npm run ci:debug --silent

      - name: Print ci:debug artifacts
        if: always()
        run: |
          set -euo pipefail
          test -f outputs/ci/debug/report.json && cat outputs/ci/debug/report.json || true
          test -f outputs/ci/debug/metrics.prom && cat outputs/ci/debug/metrics.prom || true
          test -f outputs/ci/governance-propagation-coverage/coverage.txt && cat outputs/ci/governance-propagation-coverage/coverage.txt || true

      - name: Alert on ci:debug failure details
        if: always()
        run: |
          set -euo pipefail
          if ! command -v python3 >/dev/null 2>&1; then
            echo "::warning::python3 unavailable; skipping ci:debug alert extraction"
            exit 0
          fi
          python3 scripts/ci/report-alert.py ci-debug outputs/ci/debug/report.json
