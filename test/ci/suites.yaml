version: 1
policy:
  description: "Test pyramid lane weighting for CI decisioning"
  weights:
    unit: 70
    integration: 20
    e2e: 10

suites:
  - name: unit
    weight: 70
    owner: "platform-core"
    scope:
      - "./pkg/..."
    gate:
      required_on_pr: true
      coverage_threshold: 70

  - name: integration
    weight: 20
    owner: "platform-integration"
    scope:
      - "./test/integration_test.go"
      - "./test/integration_scenarios_test.go"
      - "./pkg/backup/..."
      - "./pkg/vault/..."
    gate:
      required_on_pr_when_changed:
        - "test/integration*"
        - "pkg/vault/**"
        - "pkg/backup/**"
        - "scripts/ci/**"
        - ".github/workflows/ci.yml"

  - name: e2e-smoke
    weight: 10
    owner: "platform-e2e"
    scope:
      - "./test/e2e/smoke/..."
    gate:
      required_on_pr: true

  - name: e2e-full
    weight: 0
    owner: "platform-e2e"
    scope:
      - "./test/e2e/full/..."
    gate:
      scheduled_or_manual_only: true

  - name: fuzz
    weight: 0
    owner: "platform-security"
    scope:
      - "./pkg/crypto"
      - "./pkg/interaction"
      - "./pkg/parse"
    gate:
      informational_on_pr: true
      required_on_schedule: true
