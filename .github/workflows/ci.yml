# ci.yml - Consolidated CI pipeline
# Last Updated: 2026-02-22

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: CI preflight
        run: scripts/ci/preflight.sh

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.0.0

      - name: Run lint lane
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${CI_EVENT_NAME}" = "pull_request" ]; then
            scripts/ci/lint.sh changed
          else
            scripts/ci/lint.sh all
          fi

      - name: Summarize lint lane
        if: always()
        env:
          CI_LANE: lint
          CI_STATUS: ${{ job.status }}
          CI_LOG_DIR: outputs/ci
        run: scripts/ci/summary.sh

  ci-unit:
    name: ci-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: CI preflight
        run: scripts/ci/preflight.sh

      - name: Run unit lane
        run: scripts/ci/test.sh unit

      - name: Summarize unit lane
        if: always()
        env:
          CI_LANE: unit
          CI_STATUS: ${{ job.status }}
          CI_LOG_DIR: outputs/ci
          CI_COVERAGE_FILE: coverage.out
        run: scripts/ci/summary.sh

  ci-integration:
    name: ci-integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: CI preflight
        run: scripts/ci/preflight.sh

      - name: Run integration lane
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_REF: ${{ github.base_ref }}
        run: scripts/ci/test.sh integration

      - name: Summarize integration lane
        if: always()
        env:
          CI_LANE: integration
          CI_STATUS: ${{ job.status }}
          CI_LOG_DIR: outputs/ci
        run: scripts/ci/summary.sh

  ci-e2e-smoke:
    name: ci-e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: CI preflight
        run: scripts/ci/preflight.sh

      - name: Run e2e smoke lane
        run: scripts/ci/test.sh e2e-smoke

      - name: Summarize e2e smoke lane
        if: always()
        env:
          CI_LANE: e2e-smoke
          CI_STATUS: ${{ job.status }}
          CI_LOG_DIR: outputs/ci
        run: scripts/ci/summary.sh

  ci-fuzz:
    name: ci-fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: CI preflight
        run: scripts/ci/preflight.sh

      - name: Run fuzz lane
        run: scripts/ci/test.sh fuzz

      - name: Summarize fuzz lane
        if: always()
        env:
          CI_LANE: fuzz
          CI_STATUS: ${{ job.status }}
          CI_LOG_DIR: outputs/ci
        run: scripts/ci/summary.sh

  ci-e2e-full:
    name: ci-e2e-full
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: CI preflight
        run: scripts/ci/preflight.sh

      - name: Run e2e full lane
        run: scripts/ci/test.sh e2e-full

      - name: Summarize e2e full lane
        if: always()
        env:
          CI_LANE: e2e-full
          CI_STATUS: ${{ job.status }}
          CI_LOG_DIR: outputs/ci
        run: scripts/ci/summary.sh
